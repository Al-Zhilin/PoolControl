; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600
build_flags =
    -I"${PROJECT_DIR}"
    -DCORE_DEBUG_LEVEL=5

lib_deps =
    GyverLibs/GyverDS18
    marian-craciunescu/ESP32Ping
    bblanchon/ArduinoJson
    yasheena/TelnetSpy


[env:esp32ota]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
    -I"${PROJECT_DIR}"
    -DCORE_DEBUG_LEVEL=2  ;0 - откл полностью, 5 - вкл все (ERROR-WARN-INFO-DEBUG-VERBOSE)
lib_deps =
    GyverLibs/GyverDS18
    marian-craciunescu/ESP32Ping
    bblanchon/ArduinoJson
    yasheena/TelnetSpy

upload_protocol = espota
extra_scripts = pre:scripts/OTA_secrets.py
monitor_speed=115200
upload_speed=921600
